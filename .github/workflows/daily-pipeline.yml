name: MLB Prop Daily Runner

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

# FIX 1: Changed contents from 'read' to 'write' so the bot can save data back to your repo
permissions:
  contents: write
  pages: write
  id-token: write

# Prevents multiple automated runs from colliding
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Cache Pybaseball Data
        uses: actions/cache@v4
        with:
          path: ~/.pybaseball
          key: pybaseball-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            pybaseball-${{ runner.os }}-

      - name: Run Inference & Scraper Engine
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          BALLDONTLIE_KEY: ${{ secrets.BALLDONTLIE_KEY }}
        run: python -m src.main

      # FIX 2: Commit the new data back to the repository permanently
      # FIX: Added wallet.json to the list of tracked files
      - name: Commit and Push Data Updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add web/public/predictions.json web/public/history.json web/public/wallet.json
          git commit -m "Automated daily data update [skip ci]" || echo "No changes to commit"
          git push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Web App
        run: cd web && npm install && npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4